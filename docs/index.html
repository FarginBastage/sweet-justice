<style>
:root{font-family:Inter,system-ui,-apple-system,Segoe UI,sans-serif;color:#24272d;background:#f8f3ea}*{box-sizing:border-box}body{margin:0;background:linear-gradient(90deg,rgba(255,255,255,.5) 1px,transparent 1px) 0 0/36px 36px,linear-gradient(180deg,#f8f3ea,#eef7f4 58%,#f9eee7)}button,select{font:inherit}button{cursor:pointer}.wrap{max-width:1420px;margin:auto;min-height:100vh;padding:18px}.top,.turn{display:flex;justify-content:space-between;gap:16px;align-items:center}.top{margin-bottom:18px}.eyebrow{margin:0 0 6px;text-transform:uppercase;letter-spacing:.08em;font-size:.74rem;font-weight:900;color:#6b5960}h1,h2,p{margin-top:0}h1{font-size:clamp(2rem,4vw,4rem);line-height:.95;margin-bottom:0}h2{font-size:1.12rem}.panel,.score,.question,.board,.side{border:2px solid #222831;border-radius:8px;background:rgba(255,255,255,.92);box-shadow:0 10px 0 rgba(34,40,49,.16);padding:18px}.lobby{display:grid;grid-template-columns:.9fr 1.1fr;gap:18px}.game{display:none;grid-template-columns:250px minmax(0,1fr) 300px;gap:16px}.grid{display:grid;gap:12px}.row{display:flex;flex-wrap:wrap;gap:10px}.seg{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.btn,.seg button,.choice button,.card button{border:2px solid #222831;border-radius:8px;background:#fff;color:#20242a;box-shadow:0 5px 0 #222831;min-height:42px;padding:10px 12px;font-weight:900}.btn.primary{background:#ef7d45;min-height:48px}.seg .on,.toggle.on{background:#58bfa3}.btn:active,.seg button:active,.choice button:active,.card button:active{transform:translateY(3px);box-shadow:0 2px 0 #222831}button:focus-visible,select:focus-visible{outline:3px solid #1d71b8;outline-offset:3px}label{display:grid;gap:7px;margin:12px 0;font-weight:800}select{width:100%;min-height:44px;border:2px solid #3d4652;border-radius:7px;background:#fff;padding:0 12px}.scores{display:grid;gap:12px;align-content:start}.score.active{background:#fff3c7}dl{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:0}dt{font-size:.75rem;color:#606774}dd{margin:0;font-weight:900}.board{padding:0;overflow:hidden}.board svg{display:block;width:100%;min-height:360px}.question{margin-top:14px}.choice{display:grid;gap:10px}.choice button{display:grid;grid-template-columns:34px 1fr;gap:10px;align-items:center;text-align:left}.choice span{display:grid;place-items:center;width:30px;height:30px;border-radius:50%;background:#222831;color:#fff}.fact{padding:10px;border-left:5px solid #8e58cf;background:#f4effc;font-weight:650}.citation{margin:12px 0 0;color:#49515d;font-weight:800}.facility{display:grid;grid-template-columns:84px 1fr;gap:12px;align-items:center;padding:10px;border:2px dashed #8b7d67;border-radius:8px;background:#fcfaf4}.facility svg{width:84px;height:84px}.facility strong{display:block;font-size:1.5rem}.facility span,.log,.history{color:#4b5360;font-size:.92rem}.hidden{display:none!important}@media(max-width:1050px){.game{grid-template-columns:1fr}.scores{grid-template-columns:repeat(2,minmax(0,1fr))}}@media(max-width:760px){.wrap{padding:10px}.top,.turn{align-items:stretch;flex-direction:column}.lobby{grid-template-columns:1fr}.seg,.scores{grid-template-columns:1fr}.board{overflow-x:auto}.board svg{width:980px}.choice button{grid-template-columns:1fr}}
</style>
<script src="questions.js"></script>
</head>
<body>
<main class="wrap">
<header class="top"><div><p class="eyebrow">Indiana criminal-law race</p><h1>Sweet Justice: Road to Freedom</h1></div><button id="reset" class="btn">Reset</button></header>
<section id="lobby" class="lobby"><div class="panel grid"><h2>Open Case Files</h2><div class="seg"><button data-mode="quick" class="on">Quick Race</button><button data-mode="full">Full Race</button><button data-mode="study">Solo Study</button></div><label>Case pack<select id="pack"><option value="mixed">Mixed Criminal</option><option value="hearsay">Hearsay</option><option value="suppression">Search and Seizure</option><option value="trial">Trial Skills</option><option value="appeals">Appeals / PCR</option></select></label><label>Difficulty<select id="difficulty"><option value="1">Student</option><option value="2">Practitioner</option><option value="3">Trial Lawyer</option></select></label><div class="row"><button id="timer" class="btn toggle">Timer off</button><button id="motion" class="btn toggle">Reduced motion</button><button id="contrast" class="btn toggle">High contrast</button></div></div><div class="panel grid"><label>Counsel One Portal<select id="p1Facility"></select></label><div id="p1Card" class="facility"></div><label>Counsel One token<select id="p1Token"></select></label><label id="p2FacilityLabel">Counsel Two Portal<select id="p2Facility"></select></label><div id="p2Card" class="facility"></div><label id="p2TokenLabel">Counsel Two token<select id="p2Token"></select></label><button id="start" class="btn primary">Start lawful race</button></div></section>
<section id="game" class="game"><aside id="scores" class="scores"></aside><div><div id="board" class="board"></div><div class="panel turn"><div><p class="eyebrow">Current turn</p><h2 id="turnName"></h2><p id="spaceName"></p></div><button id="turnButton" class="btn primary">Roll die</button></div><div id="question" class="question hidden"></div></div><aside class="side"><h2>Motion Cards</h2><div id="cards" class="card grid"></div><h2>Case Log</h2><ol id="log" class="log"></ol><h2>Local Scores</h2><ol id="history" class="history"></ol></aside></section>
</main>
<script>
const F=[['branchville','Branchville Correctional Facility','Branchville','Medium','BCF',44,76],['chain-o-lakes',"Chain O'Lakes Correctional Facility",'Albion','Minimum','COL',52,18],['correctional-industrial','Correctional Industrial Facility','Pendleton','Medium','CIF',62,43],['heritage-trail','Heritage Trail Correctional Facility','Plainfield','Medium','HTC',47,49],['indiana-state-prison','Indiana State Prison','Michigan City','Maximum','ISP',38,9],['indiana-womens',"Indiana Women's Prison",'Indianapolis','Maximum','IWP',53,48],['madison','Madison Correctional Facility','Madison','Minimum','MCF',68,77],['miami','Miami Correctional Facility','Bunker Hill','Medium','MCF',55,28],['new-castle','New Castle Correctional Facility','New Castle','Medium','NCC',68,45],['pendleton','Pendleton Correctional Facility','Pendleton','Maximum','PCF',64,42],['plainfield','Plainfield Correctional Facility','Plainfield','Medium','PCF',46,50],['putnamville','Putnamville Correctional Facility','Greencastle','Medium','PUT',34,51],['reception-diagnostic','Reception Diagnostic Center','Plainfield','Intake','RDC',47,50],['rockville','Rockville Correctional Facility','Rockville','Medium','RCF',24,49],['south-bend','South Bend Community Re-Entry Center','South Bend','Re-entry','SBR',42,13],['wabash-valley','Wabash Valley Correctional Facility','Carlisle','Maximum','WVC',27,66],['westville','Westville Correctional Facility','Westville','Medium','WCF',40,11],['work-release-indy','Indianapolis Re-Entry Educational Facility','Indianapolis','Re-entry','IRE',53,49],['youth-logansport','Logansport Juvenile Correctional Facility','Logansport','Juvenile','LJC',49,31],['pendleton-juvenile','Pendleton Juvenile Correctional Facility','Pendleton','Juvenile','PJC',65,43]].map(([id,name,city,security,badge,x,y])=>({id,name,city,security,badge,x,y}));
const T=['Briefcase','Legal Pad','Key','Scroll','Gavel'],C=[['limine','Motion in Limine','Peek at the next category and remove one distractor.'],['suppress','Motion to Suppress','Cancel one Suppression Swamp penalty.'],['proof','Offer of Proof','Retry one exclusion question.'],['plain','Plain Error','Retry one unpreserved appellate question.'],['bond','Bond Review','Remove up to two Custody Days.']].map(([id,name,effect])=>({id,name,effect}));
const Q=(window.SJ_QUESTIONS||[]).map((r,id)=>({id,cat:r[0],diff:r[1],rule:r[2],prompt:r[3],choices:r[4],answer:r[5],ex:r[6]}));
const R={quick:[['facility','Facility Start Portals','#556170',1],['bond','Bond Bonbon Borough','#f0c84b',4],['discovery','Discovery Drops and Brady Bridge','#f0c84b',3],['suppression','Suppression Syrup Swamp','#4f9bd9',5],['hearsay','Hearsay Highlands','#8e58cf',8],['trial','Trial Truffle Court','#58bfa3',5],['sentencing','Sentencing Sundae','#d95c5c',3],['appeals','Appeals Candy Tower','#1e9da4',4],['pcr','PCR Peppermint Maze','#b33f86',2],['freedom','Freedom Fountain','#ef7d45',1]],full:[['facility','Facility Start Portals','#556170',1],['bond','Bond Bonbon Borough','#f0c84b',7],['discovery','Discovery Drops and Brady Bridge','#f0c84b',7],['suppression','Suppression Syrup Swamp','#4f9bd9',9],['hearsay','Hearsay Highlands','#8e58cf',16],['trial','Trial Truffle Court','#58bfa3',10],['sentencing','Sentencing Sundae','#d95c5c',7],['appeals','Appeals Candy Tower','#1e9da4',7],['supreme','Supreme Court Sugar Castle','#1e9da4',3],['pcr','PCR Peppermint Maze','#b33f86',4],['freedom','Freedom Fountain','#ef7d45',1]]};
let mode='quick',state=null;const $=id=>document.getElementById(id),pick=a=>a[Math.floor(Math.random()*a.length)];
function makeBoard(m){let total=R[m].reduce((a,r)=>a+r[3],0),out=[],i=0;for(const r of R[m])for(let j=0;j<r[3];j++){let p=i/(total-1),x=60+p*1080,y=290+Math.sin(p*Math.PI*5.3)*105+(i%2?-18:18),kind=i==0?'start':i==total-1?'finish':j==r[3]-1&&r[0]!='facility'?'boss':i%11==0?'motion':i%13==0?'hazard':'question';out.push({i,region:r[0],name:kind=='boss'?r[1]+' boss':r[1],color:r[2],x:Math.round(x),y:Math.round(y),kind});i++}return out}
function player(id,name){return{id,name,token:$(id+'Token').value,pos:0,score:0,custody:0,preserve:0,cards:['limine'],correct:0,answered:0,streak:0}}
function fill(){for(const id of ['p1Facility','p2Facility'])$(id).innerHTML=F.map(f=>`<option value="${f.id}">${f.name}</option>`).join('');$('p2Facility').value='pendleton';for(const id of ['p1Token','p2Token'])$(id).innerHTML=T.map(t=>`<option>${t}</option>`).join('');$('p2Token').value='Gavel';cards()}
function cards(){for(const n of ['p1','p2']){let f=F.find(x=>x.id==$(n+'Facility').value)||F[0];$(n+'Card').innerHTML=`<svg viewBox="0 0 100 100"><path d="M48 3 C28 9 18 24 20 43 C22 62 36 80 50 96 C64 80 78 62 80 43 C82 24 68 9 48 3 Z" fill="#f7f0df" stroke="#39414c" stroke-width="3"/><circle cx="${f.x}" cy="${f.y}" r="5" fill="#d95c5c" stroke="#21252b" stroke-width="2"/></svg><div><strong>${f.badge}</strong><span>${f.city} - ${f.security}</span></div>`}}
function start(){state={phase:'rolling',pack:$('pack').value,diff:+$('difficulty').value,active:'p1',board:makeBoard(mode=='study'?'quick':mode),players:{p1:player('p1','Counsel One'),p2:player('p2','Counsel Two')},q:null,last:null,winner:null,used:{},log:['Case files opened. Roll for lawful relief.']};$('lobby').style.display='none';$('game').style.display='grid';render()}
function pool(s){let cats=[s.region];if(s.region=='supreme')cats=['appeals'];if(s.region=='freedom')cats=['freedom'];let p=Q.filter(x=>x.diff<=state.diff&&(cats.includes(x.cat)||x.cat=='freedom'));if(state.pack=='hearsay')p=Q.filter(x=>x.cat=='hearsay'&&x.diff<=state.diff);if(state.pack=='suppression')p=Q.filter(x=>x.cat=='suppression'&&x.diff<=state.diff);if(state.pack=='trial')p=Q.filter(x=>x.cat=='trial'&&x.diff<=state.diff);if(state.pack=='appeals')p=Q.filter(x=>['appeals','pcr','sentencing'].includes(x.cat)&&x.diff<=state.diff);if(!p.length)p=Q.filter(x=>x.diff<=state.diff);let fresh=p.filter(x=>!state.used[x.id]);return fresh.length?fresh:p}
function roll(){let p=state.players[state.active],die=Math.floor(Math.random()*6)+1;p.pos=Math.min(p.pos+die,state.board.length-1);let s=state.board[p.pos];state.log.unshift(`${p.name} rolled ${die} and reached ${s.name}.`);if(s.kind=='motion'){let c=pick(C);p.cards.push(c.id);state.log.unshift(`${p.name} drew ${c.name}.`);state.phase='explain';state.q=null}else{state.q=pick(pool(s));state.used[state.q.id]=true;state.phase='question'}render()}
function answer(i){let p=state.players[state.active],ok=i==state.q.answer;p.answered++;if(ok){p.correct++;p.streak++;p.score+=state.q.diff>=3?150:100;if(p.streak>=3){p.preserve++;p.streak=0}}else{p.score=Math.max(0,p.score-25);p.custody++;p.pos=Math.max(0,p.pos-1);p.streak=0}state.last={ok,picked:i};state.log.unshift(`${p.name} answered ${ok?'correctly':'incorrectly'}.`);if(ok&&state.board[p.pos].kind=='finish'){state.phase='over';state.winner=state.active;save(p)}else state.phase='explain';render()}
function cont(){state.active=state.active=='p1'?'p2':'p1';state.phase='rolling';state.q=null;state.last=null;render()}
function save(p){let h=JSON.parse(localStorage.getItem('sweetJusticeScores')||'[]');h.unshift({name:p.name,score:p.score,mode,date:new Date().toISOString()});localStorage.setItem('sweetJusticeScores',JSON.stringify(h.slice(0,10)))}
function renderBoard(){let path=state.board.map((s,i)=>`${i?'L':'M'} ${s.x} ${s.y}`).join(' '),nodes=state.board.map(s=>`<circle cx="${s.x}" cy="${s.y}" r="${s.kind=='boss'||s.kind=='finish'?18:13}" fill="${s.color}" stroke="#21252b" stroke-width="3"/>`).join(''),toks=['p1','p2'].map((id,k)=>{let p=state.players[id],s=state.board[p.pos];return`<g transform="translate(${s.x+(k?-14:14)} ${s.y-34})"><circle r="18" fill="${id=='p1'?'#23395d':'#ad3d5a'}" stroke="#fff" stroke-width="4"/><text y="6" text-anchor="middle" font-size="16" font-weight="900" fill="#fff">${p.token[0]}</text></g>`}).join('');$('board').innerHTML=`<svg viewBox="0 0 1200 560"><rect width="1200" height="560" fill="#f8f3ea"/><path d="${path}" fill="none" stroke="#3f4650" stroke-width="16" stroke-linecap="round" opacity=".28"/><path d="${path}" fill="none" stroke="#fff" stroke-width="8" stroke-linecap="round"/>${nodes}<text x="72" y="92" font-size="22" font-weight="900">Facility Portals</text><text x="910" y="92" font-size="22" font-weight="900">Freedom Fountain</text>${toks}</svg>`}
function renderScores(){$('scores').innerHTML=['p1','p2'].map(id=>{let p=state.players[id],acc=p.answered?Math.round(p.correct/p.answered*100):0;return`<section class="score ${state.active==id?'active':''}"><p class="eyebrow">${p.token}</p><h2>${p.name}</h2><dl><div><dt>Relief</dt><dd>${p.score}</dd></div><div><dt>Space</dt><dd>${p.pos}</dd></div><div><dt>Custody</dt><dd>${p.custody}</dd></div><div><dt>Preserve</dt><dd>${p.preserve}</dd></div><div><dt>Accuracy</dt><dd>${acc}%</dd></div></dl></section>`}).join('')}
function renderQuestion(){let b=$('question');if(state.phase=='question'&&state.q){b.classList.remove('hidden');b.innerHTML=`<p class="eyebrow">${state.q.cat}</p><h2>${state.q.prompt}</h2><div class="choice">${state.q.choices.map((c,i)=>`<button onclick="answer(${i})"><span>${String.fromCharCode(65+i)}</span>${c}</button>`).join('')}</div><p class="citation">${state.q.rule}</p>`}else if(state.phase=='explain'&&state.q){b.classList.remove('hidden');b.innerHTML=`<p class="eyebrow">${state.last.ok?'Sustained':'Waiver Woods'}</p><h2>${state.last.ok?'Correct answer':'Not quite'}</h2><p><strong>Your answer:</strong> ${state.q.choices[state.last.picked]}</p><p><strong>Best answer:</strong> ${state.q.choices[state.q.answer]}</p><p>${state.q.ex}</p><p class="citation">${state.q.rule}</p>`}else b.classList.add('hidden')}
function render(){renderBoard();renderScores();let p=state.players[state.active],s=state.board[p.pos];$('turnName').textContent=p.name;$('spaceName').textContent=s.name;$('turnButton').textContent=state.phase=='rolling'?'Roll die':state.phase=='over'?'Rematch':'Pass turn';$('turnButton').onclick=state.phase=='rolling'?roll:state.phase=='over'?()=>location.reload():cont;renderQuestion();$('cards').innerHTML=p.cards.map(id=>C.find(c=>c.id==id)).filter(Boolean).map(c=>`<button onclick="state.players[state.active].cards=state.players[state.active].cards.filter(x=>x!='${c.id}');state.log.unshift('${c.name} played. ${c.effect}');render()"><strong>${c.name}</strong><span>${c.effect}</span></button>`).join('')||'<p>No cards in hand.</p>';$('log').innerHTML=state.log.slice(0,8).map(x=>`<li>${x}</li>`).join('');let h=JSON.parse(localStorage.getItem('sweetJusticeScores')||'[]');$('history').innerHTML=h.length?h.map(s=>`<li>${s.name}: ${s.score} (${s.mode})</li>`).join(''):'<li>No saved wins yet.</li>';if(state.phase=='over')alert(`${state.players[state.winner].name} reaches Freedom Fountain.`)}
document.querySelectorAll('[data-mode]').forEach(b=>b.onclick=()=>{mode=b.dataset.mode;document.querySelectorAll('[data-mode]').forEach(x=>x.classList.toggle('on',x==b));let solo=mode=='study';$('p2FacilityLabel').classList.toggle('hidden',solo);$('p2Card').classList.toggle('hidden',solo);$('p2TokenLabel').classList.toggle('hidden',solo)});['timer','motion','contrast'].forEach(id=>$(id).onclick=()=>$(id).classList.toggle('on'));['p1Facility','p2Facility'].forEach(id=>$(id).onchange=cards);$('start').onclick=start;$('reset').onclick=()=>location.reload();fill();
</script>
</body>
</html>
