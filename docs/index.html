<html lang="en">
<head>

  <title>Sweet Justice: Road to Freedom</title>
  <style>
    :root{font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:#24272d;background:#f8f3ea}*{box-sizing:border-box}body{margin:0;min-width:320px;background:linear-gradient(90deg,rgba(255,255,255,.42) 1px,transparent 1px) 0 0/36px 36px,linear-gradient(180deg,#f8f3ea,#eef7f4 58%,#f9eee7)}button,select{font:inherit}button{cursor:pointer}button:focus-visible,select:focus-visible{outline:3px solid #1d71b8;outline-offset:3px}.wrap{min-height:100vh;padding:18px;max-width:1500px;margin:auto}.top{display:flex;justify-content:space-between;gap:16px;align-items:center;margin-bottom:18px}.eyebrow{margin:0 0 6px;text-transform:uppercase;letter-spacing:.08em;font-size:.74rem;font-weight:800;color:#6b5960}h1,h2,p{margin-top:0}h1{font-size:clamp(2rem,4vw,4rem);line-height:.95;margin-bottom:0;letter-spacing:0}h2{font-size:1.1rem;margin-bottom:10px}.panel,.score,.question,.board,.side{border:2px solid #222831;border-radius:8px;background:rgba(255,255,255,.9);box-shadow:0 10px 0 rgba(34,40,49,.16);padding:18px}.lobby{display:grid;grid-template-columns:minmax(0,.85fr) minmax(320px,1.15fr);gap:18px}.grid{display:grid;gap:12px}.row{display:flex;flex-wrap:wrap;gap:10px}.seg{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.btn,.seg button,.choice button,.card button{border:2px solid #222831;border-radius:8px;color:#20242a;background:#fff;box-shadow:0 5px 0 #222831;min-height:42px;padding:10px 12px;font-weight:800}.btn.primary{background:#ef7d45;min-height:48px;font-weight:900}.seg .on,.toggle.on{background:#58bfa3}.btn:active,.seg button:active,.choice button:active,.card button:active{transform:translateY(3px);box-shadow:0 2px 0 #222831}label{display:grid;gap:7px;margin:12px 0;font-weight:800}select{width:100%;min-height:44px;border:2px solid #3d4652;border-radius:7px;background:#fff;color:#1f2329;padding:0 12px}.game{display:none;grid-template-columns:250px minmax(0,1fr) 300px;gap:16px}.scores{display:grid;gap:12px;align-content:start}.score.active{background:#fff3c7}dl{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:0}dt{font-size:.75rem;color:#606774}dd{margin:0;font-weight:900}.badge{display:inline-block;margin-top:10px;padding:4px 8px;border:2px solid #222831;border-radius:999px;background:#e7f4fb;font-size:.78rem;font-weight:900}.board{padding:0;overflow:hidden}.board svg{display:block;width:100%;min-height:360px}.svg-label{font-size:22px;font-weight:900;fill:#24272d}.svg-small{font-size:16px;font-weight:700;fill:#59616d}.token{transition:transform .35s ease}.turn{display:flex;justify-content:space-between;gap:14px;align-items:center}.question{margin-top:14px}.choice{display:grid;gap:10px}.choice button{display:grid;grid-template-columns:34px 1fr;gap:10px;align-items:center;text-align:left}.choice span{display:grid;place-items:center;width:30px;height:30px;border-radius:50%;background:#222831;color:#fff;font-weight:900}.fact{padding:10px;border-left:5px solid #8e58cf;background:#f4effc;font-weight:650}.citation{margin:12px 0 0;color:#49515d;font-size:.92rem;font-weight:800}.log,.history{padding-left:20px;color:#4b5360;font-size:.92rem}.facility-card{display:grid;grid-template-columns:84px 1fr;gap:12px;align-items:center;padding:10px;border:2px dashed #8b7d67;border-radius:8px;background:#fcfaf4}.facility-card svg{width:84px;height:84px}.facility-card strong{display:block;font-size:1.5rem}.facility-card span{color:#5a626f}@media(max-width:1100px){.game{grid-template-columns:1fr}.scores{grid-template-columns:repeat(2,minmax(0,1fr))}}@media(max-width:760px){.wrap{padding:10px}.top,.turn{align-items:stretch;flex-direction:column}.lobby{grid-template-columns:1fr}.seg,.scores{grid-template-columns:1fr}.board{overflow-x:auto}.board svg{width:980px;min-height:430px}.choice button{grid-template-columns:1fr}}.hidden{display:none!important}
  </style>
</head>
<body>
  <main class="wrap">
    <header class="top"><div><p class="eyebrow">Indiana criminal-law race</p><h1>Sweet Justice: Road to Freedom</h1></div><button id="reset" class="btn" title="Reset game">Reset</button></header>
    <section id="lobby" class="lobby">
      <div class="panel grid">
        <h2>Open Case Files</h2>
        <div class="seg" aria-label="Race mode"><button data-mode="quick" class="on">Quick Race</button><button data-mode="full">Full Race</button><button data-mode="study">Solo Study</button></div>
        <label>Case pack<select id="pack"><option value="mixed">Mixed Criminal</option><option value="hearsay">Hearsay</option><option value="suppression">Search and Seizure</option><option value="trial">Trial Skills</option><option value="appeals">Appeals / PCR</option></select></label>
        <label>Difficulty<select id="difficulty"><option value="1">Student</option><option value="2">Practitioner</option><option value="3">Trial Lawyer</option></select></label>
        <div class="row"><button id="timer" class="btn toggle">Timer off</button><button id="motion" class="btn toggle">Reduced motion</button><button id="contrast" class="btn toggle">High contrast</button></div>
      </div>
      <div class="panel grid">
        <label>Counsel One Portal<select id="p1Facility"></select></label><div id="p1Card" class="facility-card"></div>
        <label>Counsel One token<select id="p1Token"></select></label>
        <label id="p2FacilityLabel">Counsel Two Portal<select id="p2Facility"></select></label><div id="p2Card" class="facility-card"></div>
        <label id="p2TokenLabel">Counsel Two token<select id="p2Token"></select></label>
        <button id="start" class="btn primary">Start lawful race</button>
      </div>
    </section>
    <section id="game" class="game">
      <aside id="scores" class="scores"></aside>
      <div><div id="board" class="board"></div><div class="panel turn"><div><p class="eyebrow">Current turn</p><h2 id="turnName"></h2><p id="spaceName"></p></div><button id="turnButton" class="btn primary">Roll die</button></div><div id="question" class="question hidden"></div></div>
      <aside class="side"><h2>Motion Cards</h2><div id="cards" class="card grid"></div><h2>Case Log</h2><ol id="log" class="log"></ol><h2>Local Scores</h2><ol id="history" class="history"></ol></aside>
    </section>
  </main>
<script>
const facilities=[['branchville','Branchville Correctional Facility','Branchville','Medium','BCF',44,76],['chain-o-lakes',"Chain O'Lakes Correctional Facility",'Albion','Minimum','COL',52,18],['correctional-industrial','Correctional Industrial Facility','Pendleton','Medium','CIF',62,43],['edward-walter','Edinburgh Correctional Facility','Edinburgh','Minimum','ECF',56,57],['heritage-trail','Heritage Trail Correctional Facility','Plainfield','Medium','HTC',47,49],['indiana-state-prison','Indiana State Prison','Michigan City','Maximum','ISP',38,9],['indiana-womens',"Indiana Women's Prison",'Indianapolis','Maximum','IWP',53,48],['madison','Madison Correctional Facility','Madison','Minimum','MCF',68,77],['miami','Miami Correctional Facility','Bunker Hill','Medium','MCF',55,28],['new-castle','New Castle Correctional Facility','New Castle','Medium','NCC',68,45],['pendleton','Pendleton Correctional Facility','Pendleton','Maximum','PCF',64,42],['plainfield','Plainfield Correctional Facility','Plainfield','Medium','PCF',46,50],['putnamville','Putnamville Correctional Facility','Greencastle','Medium','PUT',34,51],['reception-diagnostic','Reception Diagnostic Center','Plainfield','Intake','RDC',47,50],['rockville','Rockville Correctional Facility','Rockville','Medium','RCF',24,49],['south-bend','South Bend Community Re-Entry Center','South Bend','Re-entry','SBR',42,13],['wabash-valley','Wabash Valley Correctional Facility','Carlisle','Maximum','WVC',27,66],['westville','Westville Correctional Facility','Westville','Medium','WCF',40,11],['work-release-indy','Indianapolis Re-Entry Educational Facility','Indianapolis','Re-entry','IRE',53,49],['youth-logansport','Logansport Juvenile Correctional Facility','Logansport','Juvenile','LJC',49,31],['pendleton-juvenile','Pendleton Juvenile Correctional Facility','Pendleton','Juvenile','PJC',65,43]].map(([id,name,city,security,badge,x,y])=>({id,name,city,security,badge,x,y}));
const tokens=['Briefcase','Legal Pad','Key','Scroll','Gavel'];
const cards=[['limine','Motion in Limine','Peek at the next category and remove one distractor.','A preliminary ruling often still needs a timely trial objection.'],['suppress','Motion to Suppress','Cancel one Suppression Swamp backward move after a foundation question.','Remedy follows source, violation, standing, and exception analysis.'],['proof','Offer of Proof','Retry one exclusion question and gain a Preservation Token if correct.','A record of excluded evidence helps preserve appellate review.'],['plain','Plain Error','Retry one unpreserved appellate question.','Plain error is exceptional, not routine.'],['bond','Bond Review','Remove up to two Custody Days after a Rule 2.6 question.','Release conditions must tie to lawful risks.']].map(([id,name,effect,lesson])=>({id,name,effect,lesson}));
const q=[
{id:'bond-001',cat:'bond',diff:1,rule:'Ind. Criminal Rule 2.6',prompt:'At an initial hearing, what is the best first question for a lawyer challenging release conditions?',choices:['Whether the conditions are tied to appearance, public safety, and lawful statutory factors.','Whether the defendant can promise to waive all future objections.','Whether the charge is unpopular in the county.','Whether a bond review would be faster than reading the order.'],answer:0,ex:'Release conditions should be tested against lawful reasons for pretrial restraint, including appearance and safety.'},
{id:'discovery-001',cat:'discovery',diff:1,rule:'Brady v. Maryland, 373 U.S. 83 (1963)',prompt:'Which item is classic Brady material?',choices:["A prosecutor's favorite trial playlist.",'Evidence favorable to the accused that is material to guilt or punishment.','Only evidence already known by the defense.','Any document with a police letterhead.'],answer:1,ex:'Brady concerns favorable, material evidence. Impeachment evidence is covered by Giglio.'},
{id:'suppression-001',cat:'suppression',diff:2,rule:'Rodriguez v. United States, 575 U.S. 348 (2015)',fact:'After writing a warning ticket, an officer keeps the driver roadside for a dog sniff without new reasonable suspicion.',prompt:'What is the strongest suppression argument?',choices:['A stop may not be prolonged beyond its mission without independent justification.','Dog sniffs are always forbidden.','Warnings are never traffic enforcement.','The Fourth Amendment applies only indoors.'],answer:0,ex:'Rodriguez focuses on prolongation. A dog sniff is not automatically barred, but extending the stop requires its own justification.'},
{id:'suppression-002',cat:'suppression',diff:2,rule:'Litchfield v. State, 824 N.E.2d 356 (Ind. 2005)',prompt:'Under Indiana Article 1, Section 11, which trio frames reasonableness review?',choices:['Suspicion, degree of intrusion, and law-enforcement needs.','Venue, docket size, and media interest.','Age, height, and occupation.','Only federal probable cause.'],answer:0,ex:'Litchfield balances suspicion, intrusion, and law-enforcement needs.'},
{id:'hearsay-801-001',cat:'hearsay',diff:1,rule:'Ind. R. Evid. 801',fact:"A witness testifies, 'The dispatcher said the alarm was active,' offered to explain why officers went to the store.",prompt:'What is the cleanest hearsay analysis?',choices:['Identify the statement, declarant, and offered purpose before naming any exception.','Call it excited utterance because an alarm sounds exciting.','It is always hearsay because it was spoken out of court.','It is never hearsay if a police officer repeats it.'],answer:0,ex:'Hearsay analysis starts with statement, declarant, and purpose. If offered to explain conduct rather than truth, the truth-use element may fail.'},
{id:'hearsay-803-001',cat:'hearsay',diff:1,rule:'Ind. R. Evid. 803(1)',prompt:'Which foundation best fits present sense impression?',choices:['The statement described an event while or immediately after the declarant perceived it.','The declarant wrote it after three months of careful reflection.','The statement was in a public building.','The witness believes the statement feels true.'],answer:0,ex:'Rule 803(1) turns on contemporaneous or near-contemporaneous description of the perceived event.'},
{id:'hearsay-805-001',cat:'hearsay',diff:2,rule:'Ind. R. Evid. 805',fact:"A report says, 'Neighbor told Officer Lee that Dana said the car was stolen.'",prompt:'What must the proponent handle?',choices:['Each hearsay layer must fit an exclusion or exception.','Only the outer report matters.','The rule disappears if the statement is dramatic.','Indiana has a residual Rule 807 for any useful statement.'],answer:0,ex:'Rule 805 requires every hearsay layer to be admissible. Indiana Article VIII does not include a residual Rule 807.'},
{id:'confrontation-001',cat:'hearsay',diff:2,rule:'Crawford v. Washington, 541 U.S. 36 (2004)',prompt:'A testimonial statement from an absent witness is offered against the accused. What does Crawford require absent forfeiture?',choices:['Unavailability and a prior opportunity for cross-examination.','Only a hearsay exception.','A jury instruction saying to trust it.','A police report cover sheet.'],answer:0,ex:'The Confrontation Clause can bar testimonial hearsay even when a hearsay exception is satisfied.'},
{id:'trial-001',cat:'trial',diff:2,rule:'Batson v. Kentucky, 476 U.S. 79 (1986)',prompt:'What is the first move in a Batson challenge?',choices:['Make a prima facie showing that the strike was based on a protected characteristic.','Ask the judge to skip jury selection.','Wait until appeal to mention it for the first time.','Strike the entire venire automatically.'],answer:0,ex:'Batson begins with a prima facie showing, then a race-neutral explanation and a discrimination determination.'},
{id:'trial-002',cat:'trial',diff:1,rule:'Ind. R. Evid. 103',prompt:'Why does a precise trial objection matter?',choices:['It gives the trial court a fair chance to rule and helps preserve the issue.','It guarantees reversal.','It replaces the need for a record.','It makes all evidence inadmissible.'],answer:0,ex:'Preservation usually requires a timely, specific objection or offer of proof.'},
{id:'sentencing-001',cat:'sentencing',diff:2,rule:'Ind. Appellate Rule 7(B)',prompt:'Indiana Appellate Rule 7(B) review asks whether a sentence is inappropriate in light of what?',choices:['The nature of the offense and the character of the offender.','The shortest sentence in any neighboring state.','Only the prosecutor\'s closing argument.','Whether the appellate panel likes desserts.'],answer:0,ex:'Rule 7(B) focuses on the nature of the offense and character of the offender.'},
{id:'appeals-001',cat:'appeals',diff:1,rule:'Indiana Rules of Appellate Procedure',prompt:'Why does the standard of review matter on appeal?',choices:['It tells the reviewing court how much deference applies.','It decides which font the brief uses.','It lets parties add facts outside the record.','It erases preservation rules.'],answer:0,ex:'The standard of review shapes deference and often the practical chance of relief.'},
{id:'pcr-001',cat:'pcr',diff:2,rule:'Strickland v. Washington, 466 U.S. 668 (1984)',prompt:'What are the two Strickland components?',choices:['Deficient performance and prejudice.','Anger and surprise.','A late filing and a long transcript.','Any loss at trial and a new lawyer.'],answer:0,ex:'Strickland requires both deficient performance and a reasonable probability of a different result.'},
{id:'boss-final-001',cat:'freedom',diff:3,rule:'Mixed final boss',prompt:'Best boss answer: a criminal appeal issue is strongest when counsel can show what combination?',choices:['A preserved legal error, a favorable standard, and prejudice or a non-harmless constitutional violation.','A funny record cite and a dramatic sigh.','A new theory never raised below, with no authority.','Only that trial lasted too long.'],answer:0,ex:'Strong appellate issues connect preservation, review standard, legal error, and prejudice or harmless-error analysis.'}
];
const recipes={quick:[['facility','Facility Start Portals','Facilities','gate','#556170',1],['bond','Bond Bonbon Borough','Motions / strategy','file','#f0c84b',4],['discovery','Discovery Drops and Brady Bridge','Motions / strategy','file','#f0c84b',3],['suppression','Suppression Syrup Swamp','Search and seizure','flashlight','#4f9bd9',5],['hearsay','Hearsay Highlands','Evidence / hearsay','quote','#8e58cf',8],['trial','Trial Truffle Court','Trial skill','lectern','#58bfa3',5],['sentencing','Sentencing Sundae','Sentencing / hazards','mountain','#d95c5c',3],['appeals','Appeals Candy Tower','Appeals','tower','#1e9da4',4],['pcr','PCR Peppermint Maze','Appeals','maze','#b33f86',2],['freedom','Freedom Fountain','Finish','fountain','#ef7d45',1]],full:[['facility','Facility Start Portals','Facilities','gate','#556170',1],['bond','Bond Bonbon Borough','Motions / strategy','file','#f0c84b',7],['discovery','Discovery Drops and Brady Bridge','Motions / strategy','file','#f0c84b',7],['suppression','Suppression Syrup Swamp','Search and seizure','flashlight','#4f9bd9',9],['hearsay','Hearsay Highlands','Evidence / hearsay','quote','#8e58cf',16],['trial','Voir Dire Valley and Trial Truffle Court','Trial skill','lectern','#58bfa3',10],['sentencing','Sentencing Sundae and Habitual Hill','Sentencing / hazards','mountain','#d95c5c',7],['appeals','Court of Appeals Candy Tower','Appeals','tower','#1e9da4',7],['supreme','Supreme Court Sugar Castle','Appeals','tower','#1e9da4',3],['pcr','PCR Peppermint Maze','Appeals','maze','#b33f86',4],['freedom','Freedom Fountain','Finish','fountain','#ef7d45',1]]};
let mode='quick', settings={timer:false,motion:false,contrast:false}, state=null;
function el(id){return document.getElementById(id)}function choice(arr){return arr[Math.floor(Math.random()*arr.length)]}function board(m){let total=recipes[m].reduce((a,r)=>a+r[5],0), out=[], idx=0;for(const r of recipes[m])for(let i=0;i<r[5];i++){let p=idx/(total-1),x=60+p*1080,y=290+Math.sin(p*Math.PI*5.3)*105+(idx%2?-18:18),kind=idx==0?'start':idx==total-1?'finish':i==r[5]-1&&r[0]!='facility'?'boss':idx%11==0?'motion':idx%13==0?'hazard':'question';out.push({i:idx,region:r[0],name:kind=='boss'?r[1].split(' and ')[0]+' boss':r[1],cat:r[2],color:r[4],x:Math.round(x),y:Math.round(y),kind});idx++}return out}
function fillSelects(){for(const id of ['p1Facility','p2Facility'])el(id).innerHTML=facilities.map(f=>`<option value="${f.id}">${f.name}</option>`).join('');el('p2Facility').value='pendleton';for(const id of ['p1Token','p2Token'])el(id).innerHTML=tokens.map(t=>`<option>${t}</option>`).join('');el('p2Token').value='Gavel';updateFacilityCards()}
function updateFacilityCards(){for(const n of ['p1','p2']){let f=facilities.find(x=>x.id==el(n+'Facility').value)||facilities[0];el(n+'Card').innerHTML=`<svg viewBox="0 0 100 100"><path d="M48 3 C28 9 18 24 20 43 C22 62 36 80 50 96 C64 80 78 62 80 43 C82 24 68 9 48 3 Z" fill="#f7f0df" stroke="#39414c" stroke-width="3"/><circle cx="${f.x}" cy="${f.y}" r="5" fill="#d95c5c" stroke="#21252b" stroke-width="2"/></svg><div><strong>${f.badge}</strong><span>${f.city} - ${f.security}</span></div>`}}
function newPlayer(id,name,facility,token){return{id,name,facility,token,pos:0,score:0,custody:0,preserve:0,plain:0,cards:['limine'],correct:0,answered:0,streak:0}}
function start(){state={phase:'rolling',mode,pack:el('pack').value,diff:+el('difficulty').value,active:'p1',board:board(mode=='study'?'quick':mode),players:{p1:newPlayer('p1','Counsel One',el('p1Facility').value,el('p1Token').value),p2:newPlayer('p2','Counsel Two',el('p2Facility').value,el('p2Token').value)},q:null,last:null,winner:null,log:['Case files opened. Roll for lawful relief.']};el('lobby').style.display='none';el('game').style.display='grid';render()}
function pool(space){let cats=[space.region];if(space.region=='supreme')cats=['appeals'];if(space.region=='freedom')cats=['freedom'];let p=q.filter(x=>x.diff<=state.diff&&(cats.includes(x.cat)||x.cat=='freedom'));if(state.pack=='hearsay')p=q.filter(x=>x.cat=='hearsay'&&x.diff<=state.diff);if(state.pack=='suppression')p=q.filter(x=>x.cat=='suppression'&&x.diff<=state.diff);if(state.pack=='trial')p=q.filter(x=>x.cat=='trial'&&x.diff<=state.diff);if(state.pack=='appeals')p=q.filter(x=>['appeals','pcr','sentencing'].includes(x.cat)&&x.diff<=state.diff);return p.length?p:q.filter(x=>x.diff<=state.diff)}
function roll(){let p=state.players[state.active],die=Math.floor(Math.random()*6)+1;p.pos=Math.min(p.pos+die,state.board.length-1);let s=state.board[p.pos];state.log.unshift(`${p.name} rolled ${die} and reached ${s.name}.`);if(s.kind=='motion'){let c=choice(cards);p.cards.push(c.id);state.log.unshift(`${p.name} drew ${c.name}.`);state.phase='explain';state.q=null}else{state.q=choice(pool(s));state.phase='question'}render()}
function answer(i){let p=state.players[state.active],ok=i==state.q.answer;p.answered++;if(ok){p.correct++;p.streak++;p.score+=state.q.diff>=3?150:100;if(p.streak>=3){p.preserve++;p.streak=0}}else{p.score=Math.max(0,p.score-25);p.custody++;p.pos=Math.max(0,p.pos-1);p.streak=0}state.last={ok,picked:i};state.log.unshift(`${p.name} answered ${ok?'correctly':'incorrectly'}.`);if(ok&&state.board[p.pos].kind=='finish'){state.phase='over';state.winner=state.active;saveScore(p)}else state.phase='explain';render()}
function cont(){state.active=state.active=='p1'?'p2':'p1';state.phase='rolling';state.q=null;state.last=null;render()}
function saveScore(p){let scores=JSON.parse(localStorage.getItem('sweetJusticeScores')||'[]');scores.unshift({name:p.name,score:p.score,mode:state.mode,date:new Date().toISOString()});localStorage.setItem('sweetJusticeScores',JSON.stringify(scores.slice(0,10)))}
function renderBoard(){let path=state.board.map((s,i)=>`${i?'L':'M'} ${s.x} ${s.y}`).join(' ');let nodes=state.board.map(s=>`<g aria-label="${s.i}. ${s.name}"><circle cx="${s.x}" cy="${s.y}" r="${s.kind=='boss'||s.kind=='finish'?18:13}" fill="${s.color}" stroke="#21252b" stroke-width="3"/><text x="${s.x}" y="${s.y+4}" text-anchor="middle" font-size="16" font-weight="900" fill="#fff">${s.kind=='boss'?'!':s.kind=='motion'?'+':s.kind=='hazard'?'-':''}</text></g>`).join('');let toks=['p1','p2'].map((id,k)=>{let p=state.players[id],s=state.board[p.pos];return`<g class="token" transform="translate(${s.x+(k?-14:14)} ${s.y-34})"><circle r="18" fill="${id=='p1'?'#23395d':'#ad3d5a'}" stroke="#fff" stroke-width="4"/><text y="6" text-anchor="middle" font-size="16" font-weight="900" fill="#fff">${p.token[0]}</text></g>`}).join('');el('board').innerHTML=`<svg viewBox="0 0 1200 560" role="img"><rect width="1200" height="560" fill="#f8f3ea"/><path d="${path}" fill="none" stroke="#3f4650" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" opacity=".28"/><path d="${path}" fill="none" stroke="#fff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/><text x="72" y="92" class="svg-label">Facility Portals</text><text x="72" y="118" class="svg-small">Choose an Indiana start</text><text x="910" y="92" class="svg-label">Freedom Fountain</text><text x="910" y="118" class="svg-small">Win by lawful relief</text>${nodes}${toks}</svg>`}
function renderScores(){el('scores').innerHTML=['p1','p2'].map(id=>{let p=state.players[id],acc=p.answered?Math.round(p.correct/p.answered*100):0;return`<section class="score ${state.active==id?'active':''}"><p class="eyebrow">${p.token}</p><h2>${p.name}</h2><dl><div><dt>Relief</dt><dd>${p.score}</dd></div><div><dt>Space</dt><dd>${p.pos}</dd></div><div><dt>Custody</dt><dd>${p.custody}</dd></div><div><dt>Preserve</dt><dd>${p.preserve}</dd></div><div><dt>Accuracy</dt><dd>${acc}%</dd></div></dl>${p.plain?'<span class="badge">Plain Error token</span>':''}</section>`}).join('')}
function renderQuestion(){let box=el('question');if(state.phase=='question'&&state.q){box.classList.remove('hidden');box.innerHTML=`<p class="eyebrow">${state.q.cat}</p>${state.q.fact?`<p class="fact">${state.q.fact}</p>`:''}<h2>${state.q.prompt}</h2><div class="choice">${state.q.choices.map((c,i)=>`<button onclick="answer(${i})"><span>${String.fromCharCode(65+i)}</span>${c}</button>`).join('')}</div><p class="citation">${state.q.rule}</p>`}else if(state.phase=='explain'&&state.q){box.classList.remove('hidden');let best=state.q.choices[state.q.answer],picked=state.q.choices[state.last.picked];box.innerHTML=`<p class="eyebrow">${state.last.ok?'Sustained':'Waiver Woods'}</p><h2>${state.last.ok?'Correct answer':'Not quite'}</h2><p><strong>Your answer:</strong> ${picked}</p><p><strong>Best answer:</strong> ${best}</p><p>${state.q.ex}</p><p class="citation">${state.q.rule}</p>`}else box.classList.add('hidden')}
function render(){renderBoard();renderScores();let p=state.players[state.active],s=state.board[p.pos];el('turnName').textContent=p.name;el('spaceName').textContent=s?s.name:'Ready at the portal';el('turnButton').textContent=state.phase=='rolling'?'Roll die':state.phase=='over'?'Rematch':'Pass turn';el('turnButton').onclick=state.phase=='rolling'?roll:state.phase=='over'?()=>location.reload():cont;renderQuestion();el('cards').innerHTML=p.cards.map(id=>cards.find(c=>c.id==id)).filter(Boolean).map(c=>`<button onclick="state.players[state.active].cards=state.players[state.active].cards.filter(x=>x!='${c.id}');state.log.unshift('${c.name} played. ${c.effect}');render()"><strong>${c.name}</strong><span>${c.effect}</span></button>`).join('')||'<p>No cards in hand.</p>';el('log').innerHTML=state.log.slice(0,8).map(x=>`<li>${x}</li>`).join('');let hist=JSON.parse(localStorage.getItem('sweetJusticeScores')||'[]');el('history').innerHTML=hist.length?hist.map(s=>`<li>${s.name}: ${s.score} (${s.mode})</li>`).join(''):'<li>No saved wins yet.</li>';if(state.phase=='over')alert(`${state.players[state.winner].name} reaches Freedom Fountain.`)}
document.querySelectorAll('[data-mode]').forEach(b=>b.onclick=()=>{mode=b.dataset.mode;document.querySelectorAll('[data-mode]').forEach(x=>x.classList.toggle('on',x==b));let solo=mode=='study';el('p2FacilityLabel').classList.toggle('hidden',solo);el('p2Card').classList.toggle('hidden',solo);el('p2TokenLabel').classList.toggle('hidden',solo)});['timer','motion','contrast'].forEach(id=>el(id).onclick=()=>el(id).classList.toggle('on'));['p1Facility','p2Facility'].forEach(id=>el(id).onchange=updateFacilityCards);el('start').onclick=start;el('reset').onclick=()=>location.reload();fillSelects();
</script>
</body>
